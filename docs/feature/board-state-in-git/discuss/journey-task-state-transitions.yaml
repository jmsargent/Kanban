journey:
  name: "Task State Transitions"
  goal: "Move a task from idea to done while maintaining a clean, auditable git history"
  persona: "Jon Santos — sole developer, Go CLI tool, git-native workflow"
  feature: "board-state-in-git"
  wave: "DISCUSS"
  date: "2026-03-18"

  emotional_arc:
    start: "Curious (no status field visible in task file)"
    middle: "Focused (log appends are clean, diffs are readable)"
    end: "Confident and Satisfied (complete audit trail in domain language)"

  phases:
    - id: "phase-1"
      name: "Quick Win — kanban log command"
      description: "Wraps git log on task file; zero architectural change"
      effort_days: 1

    - id: "phase-2"
      name: "Concept B — Append-Only Transition Log"
      description: "Full redesign: hook writes to transitions.log, not task files; status field removed from YAML"
      effort_days: 8

steps:
  - id: 1
    name: "Task Creation"
    phase: "phase-2"
    command: "kanban add -t \"Add retry logic to CI step\" -p high"
    actor: "Jon Santos (developer)"

    tui_mockup: |
      $ kanban add -t "Add retry logic to CI step" -p high

      Task created: TASK-007
      Priority:     high
      Status:       todo

      Tip: use 'kanban start TASK-007' when you begin work

    shared_artifacts:
      - name: "task_id"
        source: "tasks.NextID() — internal/usecases/add_task.go"
        displayed_as: "TASK-007"
        consumers:
          - "transitions.log entries"
          - "kanban log output"
          - "kanban board display"
          - "commit message references (TASK-007)"

    emotional_state:
      entry: "Motivated — developer has a clear task to start"
      exit: "Neutral-positive — task exists, board shows it as TODO"

    integration_checkpoint: |
      task_id must be unique across .kanban/tasks/*.md
      No status field written to YAML front matter (Phase 2 behavior)
      Task file contains: id, title, priority, due, assignee, description only

    gherkin: |
      Scenario: Developer creates a new task
        Given Jon's repo has kanban initialized at /repos/kanban-tasks
        And no task with id TASK-007 exists
        When Jon runs: kanban add -t "Add retry logic to CI step" -p high
        Then .kanban/tasks/TASK-007.md is created
        And the file contains id, title, priority fields
        And the file does NOT contain a status field
        And kanban board shows TASK-007 in the TODO column

  - id: 2
    name: "Start Work (Explicit)"
    phase: "phase-2"
    command: "kanban start TASK-007"
    actor: "Jon Santos (developer)"

    tui_mockup: |
      $ kanban start TASK-007

      TASK-007 started: Add retry logic to CI step
      Transition recorded: todo → in-progress
      Assignee: jon@kanbandev.io

    shared_artifacts:
      - name: "author_email"
        source: "git config user.email — GitPort.GetIdentity()"
        displayed_as: "jon@kanbandev.io"
        consumers:
          - "transitions.log entries (author field)"
          - "kanban log output (author column)"
          - "kanban board --me filter"

      - name: "transition_entry"
        source: ".kanban/transitions.log (append)"
        displayed_as: "2026-03-15T09:14:23Z TASK-007 todo->in-progress jon@kanbandev.io manual"
        consumers:
          - "kanban board (derives current status)"
          - "kanban log (history view)"

    emotional_state:
      entry: "Ready to work — task is clear"
      exit: "Focused — log updated, no task file modified"

    integration_checkpoint: |
      TransitionLogRepository.Append() must succeed before kanban start exits 0
      .kanban/transitions.log must be created if it does not exist
      Atomic write: append uses file locking (not os.O_APPEND alone) to prevent concurrent write corruption

    gherkin: |
      Scenario: Developer starts a task explicitly
        Given TASK-007 exists with no transitions in .kanban/transitions.log
        And Jon's git identity is jon@kanbandev.io
        When Jon runs: kanban start TASK-007
        Then .kanban/transitions.log contains one entry for TASK-007
        And the entry records: todo->in-progress, jon@kanbandev.io, trigger: manual
        And .kanban/tasks/TASK-007.md is NOT modified
        And kanban board shows TASK-007 in the IN PROGRESS column

  - id: 3
    name: "Commit Work (Hook Fires)"
    phase: "phase-2"
    command: "git commit -m \"refactor: add retry logic TASK-007\""
    actor: "git commit-msg hook (automatic, triggered by developer commit)"

    tui_mockup: |
      $ git commit -m "refactor: add retry logic TASK-007"
      [main a3f12bc] refactor: add retry logic TASK-007
       2 files changed, 45 insertions(+), 3 deletions(-)
       .kanban/transitions.log | 1 +

    shared_artifacts:
      - name: "commit_sha"
        source: "git — emitted by commit-msg hook context"
        displayed_as: "a3f12bc"
        consumers:
          - "transitions.log entries (trigger field: commit:a3f12bc)"
          - "kanban log output (commit reference column)"

    emotional_state:
      entry: "Focused — committing real code changes"
      exit: "Satisfied — diff shows code + one log line append (no YAML mutation)"

    integration_checkpoint: |
      commit-msg hook MUST exit 0 in all cases (CLAUDE.md non-negotiable)
      Hook is wrapped in recover() — any panic exits 0
      Hook appends to transitions.log only when task reference found AND valid transition exists
      Hook does NOT write to .kanban/tasks/*.md

    gherkin: |
      Scenario: Hook appends transition reference on commit referencing in-progress task
        Given TASK-007 is in-progress per .kanban/transitions.log
        When Jon commits with message "refactor: add retry logic TASK-007"
        Then .kanban/transitions.log has a new entry for TASK-007
        And the entry records: trigger: commit:<sha>
        And .kanban/tasks/TASK-007.md is NOT modified by the hook
        And the commit exits with code 0

      Scenario: Hook exits 0 even on internal error
        Given the transitions.log file is unreadable (permissions error)
        When Jon commits with message "refactor: add retry logic TASK-007"
        Then the commit succeeds (exit code 0)
        And a warning is printed to stderr: "kanban: could not record transition: <error>"

  - id: 4
    name: "CI Completion (kanban ci-done)"
    phase: "phase-2"
    command: "kanban ci-done --from=abc123 --to=HEAD"
    actor: "CI pipeline (CircleCI job)"

    tui_mockup: |
      $ kanban ci-done --from=abc123 --to=HEAD

      Found 1 task in commit range:
        TASK-007: Add retry logic to CI step (in-progress → done)

      Transition recorded in .kanban/transitions.log
      Committed: .kanban/transitions.log
      Commit: [ci/kanban e91c44d] kanban: ci-done 2026-03-17

    shared_artifacts:
      - name: "ci_commit_sha"
        source: "git — emitted by kanban ci-done commit"
        displayed_as: "e91c44d"
        consumers:
          - "transitions.log entries (trigger field: ci-done:e91c44d)"
          - "kanban log output"

    emotional_state:
      entry: "Neutral — CI pipeline running automatically"
      exit: "Confident — one file committed (transitions.log only, not all task files)"

    integration_checkpoint: |
      kanban ci-done commits ONLY .kanban/transitions.log (not task files)
      This is a behavior change from the current system (which commits all transitioned task files)
      The commit message must be parseable by the commit-msg hook — must NOT reference task IDs to avoid recursive transitions
      Atomic write: transitions.log append before git commit

    gherkin: |
      Scenario: CI pipeline marks task done via ci-done
        Given TASK-007 is in-progress per .kanban/transitions.log
        And the CI commit range abc123..HEAD contains a commit referencing TASK-007
        When kanban ci-done runs with --from=abc123 --to=HEAD
        Then .kanban/transitions.log has a new entry: TASK-007 in-progress->done
        And the commit contains only .kanban/transitions.log
        And kanban board shows TASK-007 in the DONE column

  - id: 5
    name: "Audit Trail Review"
    phase: "phase-1"
    command: "kanban log TASK-007"
    actor: "Jon Santos (developer)"

    tui_mockup: |
      $ kanban log TASK-007

      TASK-007: Add retry logic to CI step
      ─────────────────────────────────────────────────────────
      2026-03-15 09:14  todo → in-progress  jon@kanbandev.io
        trigger: manual (kanban start)

      2026-03-15 14:32  in-progress (commit reference)  jon@kanbandev.io
        commit: a3f12bc  "refactor: add retry logic TASK-007"

      2026-03-17 16:42  in-progress → done  ci@kanbandev.io
        trigger: ci-done:e91c44d

    shared_artifacts:
      - name: "task_title"
        source: ".kanban/tasks/TASK-007.md (YAML front matter: title field)"
        displayed_as: "Add retry logic to CI step"
        consumers:
          - "kanban log header"
          - "kanban board display"

      - name: "transition_history"
        source: ".kanban/transitions.log (Phase 2) OR git log -- .kanban/tasks/TASK-007.md (Phase 1)"
        displayed_as: "Formatted transition table"
        consumers:
          - "kanban log output"

    emotional_state:
      entry: "Curious or investigating — needs to know the history"
      exit: "Satisfied — complete, readable history in domain language; no git knowledge required"

    integration_checkpoint: |
      Phase 1: git log output must be translated to domain language (not raw commit messages)
      Phase 2: transitions.log must be filtered to TASK-007 entries only
      Task title must be read from task file for the header (task ID alone is insufficient)
      If task does not exist: exit 1 with actionable error message

    gherkin: |
      Scenario: Developer views full transition history for a task
        Given TASK-007 has transitions recorded (manual start, commit reference, ci-done)
        When Jon runs: kanban log TASK-007
        Then the output shows TASK-007's title as the header
        And each transition is shown with: timestamp, from-status, to-status, author, trigger
        And the output is sorted chronologically (oldest first)
        And exit code is 0

      Scenario: Developer views history for task with no transitions
        Given TASK-003 exists but has no transitions in .kanban/transitions.log
        When Jon runs: kanban log TASK-003
        Then the output shows: "No transitions recorded yet."
        And current status is shown as: "todo (implicit)"
        And exit code is 0

  - id: 6
    name: "Board View (Current State)"
    phase: "phase-2"
    command: "kanban board"
    actor: "Jon Santos (developer)"

    tui_mockup: |
      $ kanban board

      TODO              IN PROGRESS         DONE
      ────              ───────────         ────
      TASK-003          TASK-005            TASK-007
      Add dark mode     Fix CI timeout      Add retry logic
      (high)            (medium)            (high)
                        TASK-006
                        Update docs
                        (low)

    shared_artifacts:
      - name: "task_current_status"
        source: ".kanban/transitions.log — TransitionLogRepository.LatestStatus()"
        displayed_as: "Column placement (TODO / IN PROGRESS / DONE)"
        consumers:
          - "kanban board column grouping"
          - "kanban log (most recent status)"

    emotional_state:
      entry: "Neutral — wants a quick status overview"
      exit: "Confident — board reflects the log-derived state accurately"

    integration_checkpoint: |
      Board must derive status from transitions.log, not task file YAML
      Tasks with no log entries are implicitly TODO
      Board output format unchanged from current system (user-visible behavior preserved)

    gherkin: |
      Scenario: Board shows correct status derived from transitions log
        Given TASK-007 has a done transition in .kanban/transitions.log
        And TASK-005 has an in-progress transition with no done transition
        And TASK-003 has no transitions in the log
        When Jon runs: kanban board
        Then TASK-007 appears in the DONE column
        And TASK-005 appears in the IN PROGRESS column
        And TASK-003 appears in the TODO column

integration_validation:
  shared_artifact_consistency:
    - artifact: "task_id"
      must_match_across: [1, 2, 3, 4, 5, 6]
      failure_message: "Task ID inconsistency between task file, transitions log, and board display"

    - artifact: "author_email"
      must_match_across: [2, 3, 5]
      failure_message: "Author identity mismatch between git config, transitions log, and kanban log display"

    - artifact: "transition_entry"
      must_match_across: [2, 3, 4, 5, 6]
      failure_message: "Transition log entries not reflected in board state or kanban log output"

    - artifact: "task_title"
      must_match_across: [1, 5, 6]
      failure_message: "Task title mismatch between task file and kanban log header"
