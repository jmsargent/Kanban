journey:
  name: "Task Management (Git-Native CLI)"
  goal: "Track team work without leaving the terminal or maintaining a separate tool"
  persona: "Rafael Rodrigues -- backend developer on a 4-person team sharing a git repository"
  feature_id: "kanban-tasks"
  platform: "CLI with CI/CD integration hooks"
  date: "2026-03-15"

  mental_model: |
    Tasks are files in the git repository (.kanban/tasks/).
    Board state is derived by reading those files -- there is no separate database.
    State transitions are triggered by git events (commits) and CI outcomes (tests passing),
    not by manual user actions. The board is always accurate because it reflects actual work.

  emotional_arc:
    start: "Skeptical -- another tool to maintain, out of sync with code"
    middle: "Grounded and focused -- tasks live in the repo, state changes automatically on commit and CI pass"
    end: "Trusting -- the board reflects reality because the repo IS the source of truth"

steps:
  - id: 1
    name: "View Board"
    command: "kanban board"
    cli_mockup: |
      $ kanban board

      Sprint board  .kanban/tasks/  (12 tasks)

      TODO (4)
        TASK-001  Fix OAuth login bug           P2  due 2026-03-18  Rafael Rodrigues
        TASK-002  Write unit tests auth module  P2  due 2026-03-19  unassigned
        TASK-004  Update API docs               P3  due 2026-03-25  Priya Nair
        TASK-007  Refactor config loader        P3  --              unassigned

      IN PROGRESS (2)
        TASK-003  API rate limiting             P1  due 2026-03-20  Alex Kim
        TASK-005  Database migration script     P2  due 2026-03-22  Rafael Rodrigues

      DONE (6)
        TASK-006  Deploy v1.2 to staging        P1  done 2026-03-14
        ...

      Run `kanban board --help` for filter and format options.

    shared_artifacts:
      - name: "task.id"
        source: "Filename of task file (TASK-001.md -> TASK-001)"
        displayed_as: "TASK-NNN column in board output"
        consumers:
          - "kanban board"
          - "kanban edit"
          - "kanban delete"
          - "git commit message references"
          - "commit hook and CI step pattern matching"
      - name: "task.status"
        source: "status field in .kanban/tasks/TASK-NNN.md"
        displayed_as: "Column heading grouping (TODO / IN PROGRESS / DONE)"
        consumers:
          - "kanban board column grouping"
          - "kanban edit (status override)"
          - "commit hook transition logic"
          - "CI step transition logic"
      - name: "repo_root"
        source: "git rev-parse --show-toplevel"
        displayed_as: "Path prefix in output (.kanban/tasks/)"
        consumers: ["all kanban commands -- resolves .kanban/ directory location"]

    emotional_state:
      entry: "Skeptical -- 'will this be accurate or stale like every other tool?'"
      exit: "Orienting -- sees team work distributed by real status"

    integration_checkpoint: |
      kanban board reads all .md files in .kanban/tasks/, parses status field,
      groups by status value. Count per group must match actual file count with
      matching status. Empty directory shows empty state with onboarding tip.

    gherkin: |
      Scenario: View board with tasks across all statuses
        Given task files exist in .kanban/tasks/ with statuses todo, in-progress, and done
        When Rafael runs "kanban board"
        Then output shows tasks grouped under TODO, IN PROGRESS, and DONE
        And each task line shows ID, title, priority, due date, and assignee
        And each heading shows the correct count

      Scenario: View empty board
        Given .kanban/tasks/ is empty
        When Rafael runs "kanban board"
        Then output shows "No tasks found in .kanban/tasks/"
        And suggests "kanban add" as next step

  - id: 2
    name: "Create Task"
    command: "kanban add \"Fix OAuth login bug\" [--priority=P2] [--due=YYYY-MM-DD] [--assignee=\"Name\"]"
    cli_mockup: |
      $ kanban add "Fix OAuth login bug" --priority=P2 --due=2026-03-18 --assignee="Rafael Rodrigues"

      Created  TASK-001  Fix OAuth login bug
        File:      .kanban/tasks/TASK-001.md
        Status:    todo
        Priority:  P2
        Due:       2026-03-18
        Assignee:  Rafael Rodrigues
        Created:   2026-03-15

      Tip: reference TASK-001 in commit messages to auto-move to in-progress.
        git commit -m "TASK-001: begin investigation"

    shared_artifacts:
      - name: "task.id"
        source: "Auto-generated sequential ID on kanban add (TASK-NNN format)"
        displayed_as: "TASK-001 in creation output and as filename"
        consumers:
          - "all subsequent kanban commands"
          - "git commit message references"
          - "CI hook pattern matching"
      - name: "task.title"
        source: "First positional argument; stored in task file title field"
        displayed_as: "Title in creation output, board display, delete confirmation, CI log"
        consumers:
          - "kanban board"
          - "kanban edit"
          - "kanban delete confirmation"
          - "CI log messages"
      - name: "ci_task_pattern"
        source: ".kanban/config (default: TASK-[0-9]+)"
        displayed_as: "Pattern shown in tip message after kanban add"
        consumers: ["commit hook", "CI step", "auto-transition logic"]

    emotional_state:
      entry: "Purposeful -- has identified work and needs to capture it"
      exit: "Grounded -- task exists as a file in the repo, tracked by git"

    integration_checkpoint: |
      Task file created at .kanban/tasks/TASK-NNN.md with all provided fields.
      Status initialised to "todo". ID unique -- no two files with same prefix.
      File immediately visible to kanban board without additional step.

    gherkin: |
      Scenario: Create task with title only
        Given Rafael is in a directory with a git repository and .kanban/tasks/ exists
        When he runs: kanban add "Fix OAuth login bug"
        Then .kanban/tasks/TASK-001.md is created with status: todo
        And output confirms file path, ID, status, and shows commit tip for TASK-001

      Scenario: Create task with all optional fields
        When he runs: kanban add "Fix OAuth login bug" --priority=P2 --due=2026-03-18 --assignee="Rafael Rodrigues"
        Then the task file contains all provided field values
        And kanban board shows all fields on the task line

      Scenario: Create fails with empty title
        When he runs: kanban add ""
        Then exit code is 2
        And output shows "Error: Task title is required."
        And no task file is created

      Scenario: Create fails outside git repository
        Given the current directory is not a git repository
        When he runs any kanban command
        Then exit code is 1
        And output shows "Error: Not a git repository."

  - id: 3
    name: "Auto-move to In Progress"
    command: "git commit -m \"TASK-001: begin investigation\""
    trigger: "git commit hook (client-side) or CI step (server-side)"
    cli_mockup: |
      $ git commit -m "TASK-001: reproduce OAuth bug on Chrome and Firefox"

      [main 3f2a1c4] TASK-001: reproduce OAuth bug on Chrome and Firefox
       1 file changed, 3 insertions(+)

      kanban: TASK-001 moved  todo -> in-progress
        Task:    Fix OAuth login bug
        Trigger: commit 3f2a1c4

    shared_artifacts:
      - name: "task.id"
        source: "Extracted from commit message using ci_task_pattern regex"
        displayed_as: "TASK-001 in transition log line"
        consumers: ["commit hook lookup: .kanban/tasks/TASK-001.md"]
      - name: "task.status"
        source: "Written back to task file by hook/CI step"
        displayed_as: "todo -> in-progress in transition log"
        consumers: ["kanban board picks up new status on next read"]
      - name: "ci_task_pattern"
        source: ".kanban/config"
        displayed_as: "Used internally for regex extraction (not shown to user)"
        consumers: ["commit hook", "CI step"]

    emotional_state:
      entry: "Focused -- thinking about code, not tools"
      exit: "Relieved -- board updated itself, zero context switch required"

    integration_checkpoint: |
      Commit message contains ci_task_pattern match.
      Hook finds matching task file in .kanban/tasks/.
      task.status updated from "todo" to "in-progress" in file.
      If task ID not found in .kanban/tasks/, warning logged; commit not blocked.
      If task already in-progress or done, transition is a no-op with no output.

    gherkin: |
      Scenario: First commit referencing task auto-moves to in-progress
        Given TASK-001 has status "todo"
        When Rafael commits with message "TASK-001: reproduce OAuth bug"
        Then .kanban/tasks/TASK-001.md status is updated to "in-progress"
        And commit output includes "kanban: TASK-001 moved  todo -> in-progress"

      Scenario: Commit with unknown task ID warns but does not block
        Given no file exists for TASK-099
        When Rafael commits "TASK-099: fix something"
        Then the commit succeeds with exit code 0
        And output shows warning "TASK-099 not found in .kanban/tasks/ -- skipping"

      Scenario: Commit with no task ID is unaffected
        When Rafael commits "fix typo in README"
        Then no kanban output appears
        And all task statuses are unchanged

  - id: 4
    name: "Auto-move to Done"
    command: "(no manual command -- triggered by CI pipeline passing)"
    trigger: "CI/CD pipeline step, runs after all tests pass"
    cli_mockup: |
      -- CI output (GitHub Actions / GitLab CI / etc.) --

      [kanban] Scanning commits for task references...
      [kanban] Found: TASK-001 in commit 9ab34e1 by Rafael Rodrigues
      [kanban] Tests passed.
      [kanban] TASK-001 moved  in-progress -> done
               Task:     Fix OAuth login bug
               Commit:   9ab34e1
               Pipeline: build #47

    shared_artifacts:
      - name: "task.status"
        source: "Written to task file by CI step after test pass"
        displayed_as: "in-progress -> done in CI log"
        consumers: ["kanban board after CI commits updated file back to repo"]
      - name: "ci_task_pattern"
        source: ".kanban/config"
        displayed_as: "Used internally to extract task ID from pipeline commits"
        consumers: ["CI step"]

    emotional_state:
      entry: "Waiting -- tests are running, outcome unknown"
      exit: "Confident -- done means tests said so, not someone's judgment"

    integration_checkpoint: |
      CI step runs after test suite exits with code 0.
      Step scans all commit messages in the pipeline run for ci_task_pattern.
      For each matched task ID, updates status to "done" in task file.
      CI step commits updated task file(s) back to repo.
      If tests fail, no status transition occurs.

    gherkin: |
      Scenario: CI passes and auto-moves referenced task to done
        Given TASK-001 has status "in-progress"
        And commit 9ab34e1 message contains "TASK-001"
        When the CI pipeline runs and all tests pass
        Then .kanban/tasks/TASK-001.md status is updated to "done"
        And CI log shows "TASK-001 moved  in-progress -> done"

      Scenario: CI fails -- no status transition
        Given TASK-001 has status "in-progress"
        When the CI pipeline runs and tests fail
        Then TASK-001 status remains "in-progress"

      Scenario: Multiple tasks moved in one pipeline run
        Given TASK-001 and TASK-002 are both "in-progress"
        And commits in this run reference both IDs
        When the pipeline passes
        Then both tasks are updated to "done"

  - id: 5
    name: "Edit Task"
    command: "kanban edit TASK-001"
    cli_mockup: |
      $ kanban edit TASK-001

      Editing  TASK-001  Fix OAuth login bug

        title       Fix OAuth login bug
        description (empty)
        priority    P2
        due         2026-03-18
        assignee    Rafael Rodrigues
        status      in-progress  [auto-managed -- edit to override manually]

      Open in editor? [Y/n]: Y

      -- $EDITOR opens .kanban/tasks/TASK-001.md --

      Saved  TASK-001
        Updated: description, priority

    shared_artifacts:
      - name: "task.id"
        source: "Argument to kanban edit; resolves to file path"
        displayed_as: "TASK-001 in editing header"
        consumers: ["file lookup: .kanban/tasks/TASK-001.md"]
      - name: "task.title"
        source: "task file -- may be updated by editor"
        displayed_as: "Current value shown before editor opens"
        consumers: ["kanban board after save"]

    emotional_state:
      entry: "In control -- needs to correct or enrich metadata"
      exit: "Satisfied -- task is accurate without ceremony"

    integration_checkpoint: |
      kanban edit resolves file from ID argument.
      Displays current field values before opening editor.
      After save, parses updated file and confirms changed fields.
      Updated file immediately visible to kanban board.

    gherkin: |
      Scenario: Edit task description
        Given TASK-001 exists with empty description
        When Rafael runs "kanban edit TASK-001", adds description in editor, saves
        Then output confirms "Updated: description"
        And kanban board shows TASK-001 with updated metadata

      Scenario: Edit non-existent task
        When Rafael runs "kanban edit TASK-099"
        Then exit code is 1
        And output shows "Error: Task TASK-099 not found."

  - id: 6
    name: "Delete Task"
    command: "kanban delete TASK-001"
    cli_mockup: |
      $ kanban delete TASK-001

      Delete  TASK-001  Fix OAuth login bug  [in-progress]?

        This will remove .kanban/tasks/TASK-001.md from the repository.
        Commit the deletion to share with your team.

      Confirm [y/N]: y

      Deleted  TASK-001  Fix OAuth login bug
        Removed: .kanban/tasks/TASK-001.md

        Next step:
          git add -A && git commit -m "Remove TASK-001: Fix OAuth login bug"

    shared_artifacts:
      - name: "task.id"
        source: "Argument to kanban delete; resolves to file path"
        displayed_as: "TASK-001 in confirmation prompt and deletion log"
        consumers: ["file removal: .kanban/tasks/TASK-001.md"]
      - name: "task.title"
        source: "task file -- read immediately before confirmation display"
        displayed_as: "Task name in confirmation prompt for user recognition"
        consumers: ["delete confirmation prompt", "deletion log line"]

    emotional_state:
      entry: "Purposeful -- task is cancelled, out of scope, or created in error"
      exit: "Clean -- board reflects only live work"

    integration_checkpoint: |
      kanban delete reads file to show title in confirmation.
      On confirm: file removed from filesystem.
      User must commit removal to share with team.
      After commit, kanban board on all machines no longer shows the task.

    gherkin: |
      Scenario: Delete task with confirmation
        Given TASK-001 exists with status "in-progress"
        When Rafael runs "kanban delete TASK-001" and enters "y"
        Then .kanban/tasks/TASK-001.md is removed from the filesystem
        And output shows "Deleted TASK-001" and a git commit suggestion
        And kanban board no longer lists TASK-001

      Scenario: Abort delete
        When Rafael runs "kanban delete TASK-001" and enters "n"
        Then .kanban/tasks/TASK-001.md is unchanged
        And output shows "Aborted. TASK-001 unchanged."

      Scenario: Delete non-existent task
        When Rafael runs "kanban delete TASK-099"
        Then exit code is 1
        And output shows "Error: Task TASK-099 not found."

integration_validation:
  shared_artifact_consistency:
    - artifact: "task.status"
      must_match_across: [1, 2, 3, 4, 5, 6]
      failure_message: >
        task.status in the file is the single source of truth.
        kanban board reads it directly. commit hook and CI step write it directly.
        Any mismatch means a file write failed or a stale read occurred.

    - artifact: "task.id"
      must_match_across: [2, 3, 4, 5, 6]
      failure_message: >
        task.id is derived from the filename (TASK-NNN.md).
        The ID in commit messages must match an existing filename.
        Mismatch causes "not found" warnings in hook/CI output.

    - artifact: "ci_task_pattern"
      must_match_across: [3, 4]
      failure_message: >
        Commit hook and CI step must use identical regex pattern sourced from .kanban/config.
        Divergence causes inconsistent transitions between environments.

    - artifact: "task.title"
      must_match_across: [2, 5, 6]
      failure_message: >
        Title shown in delete confirmation must be the current file value.
        Read file immediately before displaying confirmation -- never cache.
