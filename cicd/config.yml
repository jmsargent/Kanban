# CircleCI Pipeline Configuration — kanban-tasks
#
# IMPORTANT: This file is at a custom path (cicd/config.yml, not .circleci/config.yml).
# One-time setup required in CircleCI Project Settings:
# Project Settings → Advanced → Config File Path → set to: cicd/config.yml
#
# Pipeline design:
# Single workflow "ci-cd" — all jobs run sequentially on push to main.
# The tag-and-release job is the final step; it runs only when all
# preceding gates pass. This implements "every CI pass → release" without
# the complexity of the CircleCI continuation orb.
#
# release-context — must contain:
# GITHUB_TOKEN (scoped to: Contents read+write on kanban repo)
# HOMEBREW_TAP_GITHUB_TOKEN (scoped to: homebrew-kanban repo contents only)
#
# Tool versions: defined in .tool-versions at the project root.
# Update .tool-versions to change tool versions — CI caches tools by
# checksum of that file, so any change automatically invalidates the cache.
# Exception: go-image-version below must be updated alongside 'golang' in
# .tool-versions, as CircleCI reads the Docker image tag at parse time.

version: 2.1

parameters:
  go-image-version:
    type: string
    default: "1.26.1"
    # Keep in sync with 'golang' in .tool-versions

orbs:
  go: circleci/go@3.0.2

executors:
  go-executor:
    docker:
      - image: cimg/go:<< pipeline.parameters.go-image-version >>
    resource_class: medium

commands:
  install-tools:
    steps:
      - restore_cache:
          keys:
            - tools-v1-{{ checksum "cicd/tool-versions" }}
      - run:
          name: Install pipeline tools
          command: make install-tools
      - save_cache:
          key: tools-v1-{{ checksum "cicd/tool-versions" }}
          paths:
            - bin/
  set-path:
    steps:
      - run:
          name: Add bin/ to PATH
          command: echo "export PATH=$PWD/bin:$PATH" >> $BASH_ENV

jobs:
  validate-and-build:
    executor: go-executor
    steps:
      - checkout
      - go/mod-download
      - install-tools
      - set-path
      - run:
          name: Architecture Check
          command: go-arch-lint check --arch-file cicd/go-arch-lint.yml
      - run:
          name: Static Analysis
          command: |
            go vet ./...
            golangci-lint run
      - run:
          name: Unit Tests
          command: gotestsum --format testname -- ./internal/...
      - run:
          name: Build
          command: go build -o kanban ./cmd/kanban
      - persist_to_workspace:
          root: .
          paths:
            - kanban

  acceptance:
    executor: go-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Set Environment
          command: |
            echo "export KANBAN_BIN=$PWD/kanban" >> $BASH_ENV
      - go/mod-download
      - install-tools
      - set-path
      - run:
          name: E2E Tests
          command: gotestsum --format testname -- ./tests/acceptance/...

  tag-and-release:
    executor: go-executor
    steps:
      - checkout
      - run:
          name: Fetch history and tags
          command: git fetch --unshallow --tags || git fetch --tags
      - go/mod-download
      - install-tools
      - set-path
      - run:
          name: Tag and release
          command: |
            # Guard: skip if commit message contains [skip release] (case-insensitive).
            if git log -1 --pretty=%B | grep -qi '\[skip release\]'; then
              echo "[skip release] detected in commit message — skipping"
              exit 0
            fi

            # Guard: if this commit already has a tag, skip tagging but still release.
            if git describe --tags --exact-match HEAD >/dev/null 2>&1; then
              echo "Commit $(git rev-parse --short HEAD) is already tagged. Skipping tag step."
            else
              go-semver-release release "https://${GITHUB_TOKEN}@github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git" \
                --tag-prefix v \
                --access-token $GITHUB_TOKEN \
                --branches '[{"name": "main"}]'
            fi

            # Checkout the exact commit the tag points to before goreleaser runs.
            # go-semver-release tags the remote HEAD which may differ from CIRCLE_SHA1.
            git fetch --tags
            LATEST_TAG=$(git tag --sort=-version:refname | grep '^v' | head -1)
            TAG_SHA=$(git rev-list -n1 "$LATEST_TAG")
            CURRENT_SHA=$(git rev-parse HEAD)
            if [ "$TAG_SHA" != "$CURRENT_SHA" ]; then
              echo "Tag $LATEST_TAG points to $TAG_SHA, not $CURRENT_SHA — checking out tagged commit"
              git checkout "$TAG_SHA"
            fi

            export GITHUB_REPOSITORY_OWNER=$CIRCLE_PROJECT_USERNAME
            goreleaser release --config cicd/goreleaser.yml --clean

workflows:
  ci-cd:
    jobs:
      - validate-and-build:
          filters:
            branches:
              only: main
      - acceptance:
          requires:
            - validate-and-build
          filters:
            branches:
              only: main
      - tag-and-release:
          requires:
            - acceptance
          context:
            - release-context
          filters:
            branches:
              only: main
