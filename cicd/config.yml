# CircleCI Pipeline Configuration — kanban-tasks
#
# IMPORTANT: This file is at a custom path (cicd/config.yml, not .circleci/config.yml).
# One-time setup required in CircleCI Project Settings:
# Project Settings → Advanced → Config File Path → set to: cicd/config.yml
#
# Pipeline design:
# Single workflow "ci-cd" — all jobs run sequentially on push to main.
# The release job (goreleaser) is the final step; it runs only when all
# preceding gates pass. This implements "every CI pass → release" without
# the complexity of the CircleCI continuation orb.
#
# release-context — must contain:
# GITHUB_TOKEN (scoped to: Contents read+write on kanban repo)
# HOMEBREW_TAP_GITHUB_TOKEN (scoped to: homebrew-kanban repo contents only)



version: 2.1



# ---------------------------------------------------------------------------

# Tool versions — update here to change versions across the entire pipeline.

# Run cicd/check-versions.sh to verify your local tools match these values.

# Note: the circleci/go orb version (below) cannot use parameters — update

# it manually alongside go-image-version if upgrading Go.

# ---------------------------------------------------------------------------
parameters:
  go-image-version:
    type: string
    default: "1.26.1"
  golangci-lint-version:
    type: string
    default: "v2.11.3"
  go-arch-lint-version:
    type: string
    default: "v1.14.0"
  go-semver-release-version:
    type: string
    default: "v6.1.0"
  goreleaser-version:
    type: string
    default: "v2.3.2"

orbs:
  go: circleci/go@3.0.2

executors:
  go-executor:
    docker:
      - image: cimg/go:<< pipeline.parameters.go-image-version >>
    resource_class: medium

commands:
  install-golangci-lint:
    steps:
      - restore_cache:
          keys:
            - golangci-lint-<< pipeline.parameters.golangci-lint-version >>
      - run:
          command: |
            if [ ! -f "$(go env GOPATH)/bin/golangci-lint" ]; then
              curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
                | sh -s -- -b $(go env GOPATH)/bin << pipeline.parameters.golangci-lint-version >>
            fi
      - save_cache:
          key: golangci-lint-<< pipeline.parameters.golangci-lint-version >>
          paths:
            - /home/circleci/go/bin/golangci-lint
  install-go-arch-lint:
    steps:
      - restore_cache:
          keys:
            - go-arch-lint-<< pipeline.parameters.go-arch-lint-version >>
      - run:
          command: |
            if [ ! -f "$(go env GOPATH)/bin/go-arch-lint" ]; then
              go install github.com/fe3dback/go-arch-lint@<< pipeline.parameters.go-arch-lint-version >>
            fi
      - save_cache:
          key: go-arch-lint-<< pipeline.parameters.go-arch-lint-version >>
          paths:
            - /home/circleci/go/bin/go-arch-lint
  install-go-semver-release:
    steps:
      - restore_cache:
          keys:
            - go-semver-release-<< pipeline.parameters.go-semver-release-version >>
      - run:
          command: |
            if [ ! -f "$(go env GOPATH)/bin/go-semver-release" ]; then
              go install github.com/s0ders/go-semver-release/v6@<< pipeline.parameters.go-semver-release-version >>
            fi
      - save_cache:
          key: go-semver-release-<< pipeline.parameters.go-semver-release-version >>
          paths:
            - /home/circleci/go/bin/go-semver-release

jobs:
  validate-and-build:
    executor: go-executor
    steps:
      - checkout
      - go/mod-download
      - install-go-arch-lint
      - run:
          name: Architecture Check
          command: go-arch-lint check
      - install-golangci-lint
      - run:
          name: Static Analysis
          command: |
            go vet ./...
            golangci-lint run
      - run:
          name: Unit Tests
          command: go test ./internal/...
      - run:
          name: Build
          command: go build -o kanban ./cmd/kanban
      - persist_to_workspace:
          root: .
          paths:
            - kanban

  acceptance:
    executor: go-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Set Environment
          command: |
            echo "export PATH=$PWD:$PATH" >> $BASH_ENV
            echo "export KANBAN_BIN=$PWD/kanban" >> $BASH_ENV
      - go/mod-download
      - run:
          name: E2E Tests
          command: go test ./tests/acceptance/...

  tag:
      executor: go-executor
      steps:
        - checkout
        - run:
            name: Fetch history
            command: git fetch --unshallow --tags || git fetch --tags
        - go/mod-download
        - install-go-semver-release
        - run:
            name: Compute and push semver tag
            command: |
              git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git"
              
              if git describe --tags --exact-match HEAD >/dev/null 2>&1; then
                exit 0
              fi

              go-semver-release release . \
                --tag-prefix v \
                --remote-name origin \
                --access-token $GITHUB_TOKEN \
                --branches '[{"name": "main"}]'

  release:
    executor: go-executor
    steps:
      - checkout
      - run:
          command: git fetch --tags
      - go/mod-download
      - run:
          command: |
            export GITHUB_REPOSITORY_OWNER=$CIRCLE_PROJECT_USERNAME
            curl -sfL https://goreleaser.com/static/run | VERSION=<< pipeline.parameters.goreleaser-version >> bash -s -- release --config cicd/goreleaser.yml --clean

workflows:
  ci-cd:
    jobs:
      - validate-and-build:
          filters:
            branches:
              only: main
      - acceptance:
          requires:
            - validate-and-build
          filters:
            branches:
              only: main
      - tag:
          requires:
            - acceptance
          context:
            - release-context
          filters:
            branches:
              only: main
      - release:
          requires:
            - tag
          context:
            - release-context
          filters:
            branches:
              only: main