{{define "content"}}
<div class="board-actions">
  <a href="/task/new" class="add-task">Add Task</a>
</div>
<div class="board">
  {{range .Columns}}
  <div class="column" data-column="{{.Column}}">
    <h2>{{.Label}}</h2>
    {{range .Tasks}}
    <div class="card" data-title="{{.Title}}"><a href="/card/{{.ID}}">{{.Title}}</a></div>
    {{end}}
  </div>
  {{end}}
</div>
{{end}}
